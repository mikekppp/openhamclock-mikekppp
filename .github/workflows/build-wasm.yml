name: Build P.533 WASM

# Builds the ITU-R P.533 WebAssembly artifact. Outputs are uploaded as a
# workflow artifact — we intentionally do not commit the binaries. Changes to
# the build script, upstream pin, or workflow file retrigger.

on:
  push:
    branches: [main, Staging]
    paths:
      - 'wasm-build/**'
      - '.github/workflows/build-wasm.yml'
  pull_request:
    branches: [main, Staging]
    paths:
      - 'wasm-build/**'
      - '.github/workflows/build-wasm.yml'
  workflow_dispatch:

permissions:
  contents: write # push builds upload p533.{mjs,wasm} to the wasm-latest release

jobs:
  build:
    if: github.repository == 'accius/openhamclock'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: 3.1.64
          actions-cache-folder: emsdk-cache

      - name: Verify emcc
        run: emcc --version

      - name: Build P.533 WASM
        working-directory: wasm-build
        run: ./build.sh

      - name: Set up Node for smoke test
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Smoke test
        working-directory: wasm-build
        run: node smoke-test.mjs

      - name: Report artifact sizes
        working-directory: wasm-build
        run: |
          ls -lh dist/
          cat dist/p533.sha256 || true

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: p533-wasm
          path: |
            wasm-build/dist/p533.mjs
            wasm-build/dist/p533.wasm
            wasm-build/dist/p533.sha256
          retention-days: 90

      # Publish to a stable release tag so Docker / local builds can curl
      # the WASM without GitHub auth. Runs only on push/dispatch to avoid
      # PRs from forks clobbering prod assets.
      - name: Publish WASM to wasm-latest release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: wasm-build/dist
        run: |
          set -euo pipefail
          TAG="wasm-latest"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "P.533 WASM (latest build)" \
              --notes "Auto-updated by .github/workflows/build-wasm.yml on every push to main/Staging. Asset URLs are stable: /releases/download/wasm-latest/p533.{mjs,wasm,sha256}. Do not hand-edit."
          fi
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            p533.mjs p533.wasm p533.sha256
